<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f6f7f9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f17" media="(prefers-color-scheme: dark)" />
    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Маркетинг — отчётность по рекламе</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%8A%3C/text%3E%3C/svg%3E"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css?v=1" />
    <script>
      // Если модули не загрузились за 15с или упали с ошибкой импорта —
      // показываем понятный экран вместо вечной заглушки.
      window.__bootErrors = [];
      function __bootFail() {
        var el = document.getElementById("app");
        if (!el) return;
        el.innerHTML =
          '<div style="padding:40px 24px;font:15px/1.6 Inter,-apple-system,sans-serif;text-align:center;max-width:340px;margin:60px auto;">' +
          '<div style="font-size:18px;font-weight:700;margin-bottom:10px;">Не удалось загрузить</div>' +
          '<div style="color:#6b7686;">Проверьте интернет и обновите страницу.</div>' +
          '<button onclick="location.reload()" style="margin-top:20px;padding:13px 26px;font:600 16px Inter,sans-serif;color:#fff;background:#6366f1;border:0;border-radius:12px;cursor:pointer;">Обновить</button>' +
          "</div>";
      }
      window.addEventListener(
        "error",
        function (e) {
          window.__bootErrors.push(e.message || "ошибка");
        },
        true
      );
      setTimeout(function () {
        if (!window.__appBooted) __bootFail();
      }, 15000);
    </script>
    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact@10.22.0",
          "preact/hooks": "https://esm.sh/preact@10.22.0/hooks",
          "htm/preact": "https://esm.sh/htm@3.1.1/preact"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"><div class="boot"><div class="boot-spinner"></div></div></div>
    <script type="module" src="./src/main.js?v=1"></script>
  </body>
</html>
