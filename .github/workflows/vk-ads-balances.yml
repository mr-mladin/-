name: VK Ads Balance Sync

on:
  schedule:
    # Каждые 30 минут
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  sync-balances:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run VK balance sync
        env:
          VK_ADS_SPREADSHEET_ID: 1URdn_vkl3G7DBRogC96g_AocsykTlhI8SZuGjOOtMIY
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          VK_ADS_BALANCE_CLIENTS_JSON: ${{ secrets.VK_ADS_BALANCE_CLIENTS_JSON }}
          VK_ADS_MAPPING_SHEET: Сопоставление
          VK_ADS_BALANCE_TARGET_SHEET: ${{ vars.VK_ADS_BALANCE_TARGET_SHEET }}
          VK_ADS_BALANCE_ACTIVE_ONLY: "false"
          VK_ADS_TIMEZONE: Europe/Moscow
        run: python sync_vk_ads_balances_to_sheets.py
