name: VK Ads Daily Sync

on:
  schedule:
    # 07:10 МСК = 04:10 UTC
    - cron: "10 4 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run VK sync
        env:
          VK_ADS_CLIENT_ID: ${{ secrets.VK_ADS_CLIENT_ID }}
          VK_ADS_CLIENT_SECRET: ${{ secrets.VK_ADS_CLIENT_SECRET }}
          VK_ADS_SPREADSHEET_ID: ${{ secrets.VK_ADS_SPREADSHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          VK_ADS_LEADS_FIELD: ${{ vars.VK_ADS_LEADS_FIELD }}
          VK_ADS_MAPPING_SHEET: ${{ vars.VK_ADS_MAPPING_SHEET }}
          VK_ADS_TIMEZONE: ${{ vars.VK_ADS_TIMEZONE }}
        run: python sync_vk_ads_to_sheets.py
