<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Доходы — учёт</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header__brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 17l6-6 4 4 8-8" />
            <path d="M14 7h7v7" />
          </svg>
        </div>
        <div>
          <h1 class="header__title">Мои доходы</h1>
          <p class="header__subtitle">Личный учёт поступлений</p>
        </div>
      </div>
      <div class="header__period">
        <label for="period">Период:</label>
        <select id="period" class="select">
          <option value="month">Этот месяц</option>
          <option value="year">Этот год</option>
          <option value="all" selected>За всё время</option>
        </select>
      </div>
    </header>

    <section class="stats">
      <div class="stat stat--primary">
        <span class="stat__label">Общий доход</span>
        <span class="stat__value" id="stat-total">0&nbsp;₽</span>
        <span class="stat__hint" id="stat-total-hint">за всё время</span>
      </div>
      <div class="stat">
        <span class="stat__label">Записей</span>
        <span class="stat__value" id="stat-count">0</span>
        <span class="stat__hint">поступлений</span>
      </div>
      <div class="stat">
        <span class="stat__label">Средний доход</span>
        <span class="stat__value" id="stat-avg">0&nbsp;₽</span>
        <span class="stat__hint">за поступление</span>
      </div>
      <div class="stat">
        <span class="stat__label">Топ-категория</span>
        <span class="stat__value stat__value--sm" id="stat-top">—</span>
        <span class="stat__hint" id="stat-top-hint">—</span>
      </div>
    </section>

    <section class="grid">
      <div class="card form-card">
        <h2 class="card__title">Добавить доход</h2>
        <form id="income-form" class="form" autocomplete="off">
          <div class="form__row">
            <label class="field">
              <span class="field__label">Сумма, ₽</span>
              <input
                type="number"
                inputmode="decimal"
                step="0.01"
                min="0"
                name="amount"
                id="amount"
                placeholder="0"
                required
              />
            </label>
            <label class="field">
              <span class="field__label">Дата</span>
              <input type="date" name="date" id="date" required />
            </label>
          </div>

          <label class="field">
            <span class="field__label">Категория</span>
            <select name="category" id="category" class="select" required>
              <option value="Зарплата">Зарплата</option>
              <option value="Фриланс">Фриланс</option>
              <option value="Бизнес">Бизнес</option>
              <option value="Инвестиции">Инвестиции</option>
              <option value="Подарки">Подарки</option>
              <option value="Возврат">Возврат</option>
              <option value="Другое">Другое</option>
            </select>
          </label>

          <label class="field">
            <span class="field__label">Комментарий <span class="field__hint">— необязательно</span></span>
            <input
              type="text"
              name="note"
              id="note"
              maxlength="120"
              placeholder="Например, заказ от клиента"
            />
          </label>

          <button type="submit" class="btn btn--primary">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5v14M5 12h14" />
            </svg>
            Добавить
          </button>
        </form>
      </div>

      <div class="card list-card">
        <div class="card__header">
          <h2 class="card__title">История</h2>
          <div class="list__filter">
            <input
              type="search"
              id="search"
              class="input"
              placeholder="Поиск по комментарию или категории"
            />
          </div>
        </div>

        <ul id="income-list" class="list" aria-live="polite"></ul>

        <div id="empty-state" class="empty">
          <div class="empty__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="6" width="18" height="13" rx="2" />
              <path d="M3 10h18M8 15h3" />
            </svg>
          </div>
          <h3 class="empty__title">Пока пусто</h3>
          <p class="empty__text">Добавьте первое поступление, чтобы увидеть его здесь.</p>
        </div>
      </div>
    </section>

    <footer class="footer">
      <span>Данные хранятся локально в браузере</span>
      <button id="export-btn" class="btn btn--ghost">Экспорт CSV</button>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
