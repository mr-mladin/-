<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Планер</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%93%3C/text%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Планер" />
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("planner.theme") || "auto";
          var resolved = mode === "auto"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : mode;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact@10.22.0",
          "preact/hooks": "https://esm.sh/preact@10.22.0/hooks",
          "htm/preact": "https://esm.sh/htm@3.1.1/preact",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"><div class="boot"><div class="boot-spinner"></div></div></div>
    <script type="module" src="./main.js"></script>
    <script>
      // Снимаем прежнюю регистрацию SW ТОЛЬКО планера (scope .../planner/).
      // Важно не трогать SW финансов и корня — иначе у них слетал бы кэш.
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then(rs => rs.forEach(r => {
            if (r.scope.replace(location.origin, "").replace(/\/$/, "") === "/planner") r.unregister();
          }))
          .catch(() => {});
      }
    </script>
  </body>
</html>
