<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <!-- Цвет строки статуса/обводки браузера: голубой в светлой теме, тёмный — в тёмной
         (иначе в тёмной теме сверху остаётся ярко-голубая полоса, не совпадающая с фоном). -->
    <meta name="theme-color" content="#0ea5e9" />
    <meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0a0f17" media="(prefers-color-scheme: dark)" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Заранее открываем соединения к CDN и базе — экономит время на старте. -->
    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://rxzjbyuxslzcnlkzdxqn.supabase.co" crossorigin />
    <title>Планер</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%93%3C/text%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Планер" />
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("planner.theme") || "auto";
          var resolved = mode === "auto"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : mode;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css?v=122" />
    <script>
      // Диагностика загрузки: если код не стартовал за 15с или случилась ошибка
      // импорта модулей — показываем экран ошибки вместо вечной крутилки.
      window.__bootErrors = [];
      function __bootFail(msg) {
        var el = document.getElementById("app");
        if (!el) return;
        el.innerHTML =
          '<div style="padding:40px 24px;font:15px/1.6 -apple-system,BlinkMacSystemFont,sans-serif;color:#0b1220;text-align:center;max-width:340px;margin:0 auto;">' +
          '<div style="font-size:18px;font-weight:700;margin-bottom:10px;">Не удалось загрузить</div>' +
          '<div style="color:#64748b;">Проверьте интернет и обновите страницу. Часто помогает со второго раза.</div>' +
          '<button onclick="location.reload()" style="margin-top:20px;padding:13px 26px;font:600 16px -apple-system,BlinkMacSystemFont,sans-serif;color:#fff;background:#0ea5e9;border:0;border-radius:12px;cursor:pointer;">Обновить</button>' +
          (window.__bootErrors && window.__bootErrors.length ? '<div style="margin-top:18px;font-size:11px;color:#94a3b8;word-break:break-word;">' + window.__bootErrors.join("; ") + '</div>' : '') +
          '</div>';
      }
      window.addEventListener("error", function (e) {
        var m = (e.message || "ошибка") + (e.filename ? " @ " + e.filename + ":" + (e.lineno || 0) : "");
        window.__bootErrors.push(m);
      }, true);
      window.addEventListener("unhandledrejection", function (e) {
        var r = e.reason; window.__bootErrors.push("promise: " + ((r && r.message) || r || ""));
      });
      setTimeout(function () {
        if (!window.__appBooted) __bootFail();
      }, 15000);
    </script>
    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact@10.22.0",
          "preact/hooks": "https://esm.sh/preact@10.22.0/hooks",
          "htm/preact": "https://esm.sh/htm@3.1.1/preact",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"><div class="boot"><div class="boot-spinner"></div></div></div>
    <script type="module" src="./main.js?v=127"></script>
    <script>
      // Регистрируем SW планера: он кэширует только библиотеки с CDN (esm.sh),
      // файлы приложения всегда из сети. Ускоряет запуск с домашней иконки.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function (e) { window.__bootErrors && window.__bootErrors.push("sw: " + ((e && e.message) || e)); });
        });
      }
    </script>
  </body>
</html>
