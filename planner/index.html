<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#0ea5e9" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- Заранее открываем соединения к CDN и базе — экономит время на старте. -->
    <link rel="preconnect" href="https://esm.sh" crossorigin />
    <link rel="preconnect" href="https://rxzjbyuxslzcnlkzdxqn.supabase.co" crossorigin />
    <title>Планер</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%97%93%3C/text%3E%3C/svg%3E" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Планер" />
    <script>
      (function () {
        try {
          var mode = localStorage.getItem("planner.theme") || "auto";
          var resolved = mode === "auto"
            ? (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light")
            : mode;
          document.documentElement.setAttribute("data-theme", resolved);
        } catch (e) { document.documentElement.setAttribute("data-theme", "light"); }
      })();
    </script>
    <link rel="stylesheet" href="./styles.css?v=53" />
    <script>
      // Диагностика загрузки: если код не стартовал за 10с или случилась ошибка
      // импорта модулей — показываем текст ошибки вместо вечной крутилки.
      // Это временно, чтобы понять причину зависания на мобильном.
      window.__bootErrors = [];
      function __bootFail(msg) {
        var el = document.getElementById("app");
        if (!el) return;
        el.innerHTML =
          '<div style="padding:24px 18px;font:14px/1.5 -apple-system,BlinkMacSystemFont,sans-serif;color:#b00020;white-space:pre-wrap;word-break:break-word;">' +
          "Не удалось загрузить приложение.\n\n" + (msg || "") +
          (window.__bootErrors.length ? "\n\nОшибки:\n" + window.__bootErrors.join("\n") : "") +
          "\n\nСделайте скриншот и пришлите.</div>";
      }
      window.addEventListener("error", function (e) {
        var m = (e.message || "ошибка") + (e.filename ? " @ " + e.filename + ":" + (e.lineno || 0) : "");
        window.__bootErrors.push(m);
      }, true);
      window.addEventListener("unhandledrejection", function (e) {
        var r = e.reason; window.__bootErrors.push("promise: " + ((r && r.message) || r || ""));
      });
      setTimeout(function () {
        if (!window.__appBooted) __bootFail("Таймаут 30 секунд — код приложения не запустился.");
      }, 30000);
    </script>
    <script type="importmap">
      {
        "imports": {
          "preact": "https://esm.sh/preact@10.22.0",
          "preact/hooks": "https://esm.sh/preact@10.22.0/hooks",
          "htm/preact": "https://esm.sh/htm@3.1.1/preact",
          "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.45.4"
        }
      }
    </script>
  </head>
  <body>
    <div id="app"><div class="boot"><div class="boot-spinner"></div></div></div>
    <script type="module" src="./main.js?v=53"></script>
    <script>
      // Регистрируем SW планера: он кэширует только библиотеки с CDN (esm.sh),
      // файлы приложения всегда из сети. Ускоряет запуск с домашней иконки.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./sw.js").catch(function () {});
        });
      }
    </script>
  </body>
</html>
